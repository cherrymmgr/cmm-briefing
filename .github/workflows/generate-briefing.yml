name: Generate Daily Briefing

on:
  schedule:
    - cron: '0 6 * * 1-5'   # 09:00 EET weekdays
  workflow_dispatch:          # manual trigger

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate briefing
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
        run: python scripts/generate_briefing.py

      - name: Commit and push
        run: |
          git config user.name  "cmm-briefing[bot]"
          git config user.email "briefing@cherrymm.gr"
          git add briefing/index.html
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "briefing: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
